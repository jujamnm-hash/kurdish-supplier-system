<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پاشەکەوتەکانم — دابینکەر مارکێت</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar Placeholder -->
  <div id="navbar-placeholder" data-active="favorites"></div>

  <!-- Page Header -->
  <section style="padding:2.5rem 0 1.5rem;background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-main) 100%);border-bottom:1px solid var(--border)">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h1 style="font-size:1.8rem;font-weight:700;margin:0">
          <span style="color:var(--secondary)">❤️</span> پاشەکەوتەکانم
        </h1>
        <p style="color:var(--text-muted);margin:0.25rem 0 0" id="fav-count-label">٠ کالا پاشەکەوتکراوە</p>
      </div>
      <button class="btn-outline-custom" id="clear-all-btn" onclick="clearAllFavs()" style="display:none;color:var(--secondary);border-color:var(--secondary)">
        🗑️ سڕینەوەی هەموو
      </button>
    </div>
  </section>

  <!-- Favorites Grid -->
  <main class="container" style="padding:2rem 0 4rem">

    <!-- Empty State -->
    <div id="empty-state" style="display:none;text-align:center;padding:5rem 1rem">
      <div style="font-size:5rem;opacity:.3;margin-bottom:1rem">💔</div>
      <h3 style="color:var(--text-muted);font-weight:600">هیچ کالایەکت پاشەکەوت نەکردووە</h3>
      <p style="color:var(--text-muted)">بچۆ بازاڕ و کالای دڵخوازت پاشەکەوت بکە</p>
      <a href="index.html" class="btn-primary-custom" style="display:inline-block;margin-top:1rem;text-decoration:none">
        🛍️ بچۆ بازاڕ
      </a>
    </div>

    <!-- Products Grid -->
    <div class="row g-4" id="fav-grid"></div>

  </main>

  <!-- Footer -->
  <footer style="background:var(--bg-card);border-top:1px solid var(--border);padding:2rem 0;text-align:center;color:var(--text-muted);font-size:.9rem">
    <div class="container">
      <p style="margin:0">© 2024 دابینکەر مارکێت · هەموو مافەکان پارێزراوە</p>
    </div>
  </footer>

  <div id="toast-container" style="position:fixed;bottom:1.5rem;left:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderFavs() {
      const favProducts = Favorites.getProducts();
      const grid = document.getElementById('fav-grid');
      const empty = document.getElementById('empty-state');
      const clearBtn = document.getElementById('clear-all-btn');
      const label = document.getElementById('fav-count-label');

      const count = favProducts.length;
      label.textContent = toPersianDigits(count) + ' کالا پاشەکەوتکراوە';

      if (count === 0) {
        empty.style.display = 'block';
        grid.innerHTML = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      clearBtn.style.display = 'inline-flex';

      grid.innerHTML = favProducts.map(p => `
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
          ${buildProductCard(p)}
        </div>
      `).join('');

      updateFavBadge();
    }

    function clearAllFavs() {
      if (!confirm('دڵنیایت لە سڕینەوەی هەموو پاشەکەوتەکان؟')) return;
      Favorites.clear();
      showToast('هەموو پاشەکەوتەکان سڕایەوە', 'success');
      renderFavs();
      updateFavBadge();
    }

    function toPersianDigits(n) {
      return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderFavs();
      // Re-render if cloud sync brings new product data
      window.addEventListener('kss:synced', () => renderFavs());
    });
  </script>
</body>
</html>
