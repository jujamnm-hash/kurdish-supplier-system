<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تۆمارکردن | دابینکەر مارکێت</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div style="position:fixed;inset:0;background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);z-index:-1"></div>
<div style="position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(108,99,255,0.1) 0%,transparent 70%);top:-200px;right:-200px;border-radius:50%;z-index:-1;animation:pulse 7s ease infinite"></div>
<div style="position:fixed;width:400px;height:400px;background:radial-gradient(circle,rgba(67,233,123,0.07) 0%,transparent 70%);bottom:-100px;left:-50px;border-radius:50%;z-index:-1;animation:pulse 9s ease infinite reverse"></div>

<div class="auth-page py-5" style="min-height:auto">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-9 col-lg-7">

        <div class="auth-card fade-in" style="max-width:100%">
          <div class="auth-logo">
            <a href="index.html" style="text-decoration:none">
              <h2>✦ دابینکەر مارکێت</h2>
            </a>
            <p style="color:var(--text-muted);font-size:0.9rem;margin-top:0.5rem">
              بەشێک بە دابینکەر — ئەکاونتی خۆت دروست بکە
            </p>
          </div>

          <!-- Progress Steps -->
          <div class="d-flex justify-content-center gap-3 mb-4" id="step-indicators">
            <div class="d-flex flex-column align-items-center">
              <div class="step-circle active" id="step1-circle" style="width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:0.85rem">١</div>
              <small style="color:var(--text-muted);font-size:0.75rem;margin-top:4px">زانیاری</small>
            </div>
            <div style="flex:1;height:2px;background:var(--card-border);margin-top:18px;max-width:80px"></div>
            <div class="d-flex flex-column align-items-center">
              <div class="step-circle" id="step2-circle" style="width:36px;height:36px;border-radius:50%;background:var(--card-border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-weight:700;font-size:0.85rem">٢</div>
              <small style="color:var(--text-muted);font-size:0.75rem;margin-top:4px">کۆمپانیا</small>
            </div>
            <div style="flex:1;height:2px;background:var(--card-border);margin-top:18px;max-width:80px"></div>
            <div class="d-flex flex-column align-items-center">
              <div class="step-circle" id="step3-circle" style="width:36px;height:36px;border-radius:50%;background:var(--card-border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-weight:700;font-size:0.85rem">٣</div>
              <small style="color:var(--text-muted);font-size:0.75rem;margin-top:4px">دامەزراندن</small>
            </div>
          </div>

          <form id="register-form" novalidate>
            <!-- Step 1: Personal Info -->
            <div id="step-1">
              <h5 class="mb-3" style="color:var(--text-light)"><i class="bi bi-person me-2"></i>زانیاری کەسی</h5>
              <div class="row g-3">
                <div class="col-sm-6">
                  <label class="form-label">ناوی تەواو <span style="color:var(--danger)">*</span></label>
                  <input type="text" id="name" class="form-control" placeholder="ناو فامیلی" required/>
                </div>
                <div class="col-sm-6">
                  <label class="form-label">ئیمەیڵ <span style="color:var(--danger)">*</span></label>
                  <input type="email" id="email" class="form-control" placeholder="email@example.com" required/>
                </div>
                <div class="col-sm-6">
                  <label class="form-label">ژمارەی مۆبایل <span style="color:var(--danger)">*</span></label>
                  <input type="tel" id="phone" class="form-control" placeholder="07XX XXX XXXX" required/>
                </div>
                <div class="col-sm-6">
                  <label class="form-label">شار</label>
                  <select id="city" class="form-select">
                    <option value="">شار هەڵبژێرە...</option>
                    <option>هەولێر</option>
                    <option>سلێمانی</option>
                    <option>دهۆک</option>
                    <option>کەرکووک</option>
                    <option>زاخۆ</option>
                    <option>ئاکرێ</option>
                    <option>رانیە</option>
                    <option>سنە</option>
                    <option>بانە</option>
                    <option>هەڵەبجە</option>
                    <option>چوارچرا</option>
                    <option>کۆیە</option>
                    <option>ئەربیل</option>
                    <option>شاری دیکە</option>
                  </select>
                </div>
              </div>
              <div class="mt-3">
                <button type="button" class="btn-primary-custom w-100 justify-content-center py-3" onclick="goStep(2)">
                  داهاتوو <i class="bi bi-arrow-left"></i>
                </button>
              </div>
            </div>

            <!-- Step 2: Company Info -->
            <div id="step-2" style="display:none">
              <h5 class="mb-3" style="color:var(--text-light)"><i class="bi bi-building me-2"></i>زانیاری کۆمپانیا</h5>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">ناوی کۆمپانیا یان فرۆشگا <span style="color:var(--danger)">*</span></label>
                  <input type="text" id="company" class="form-control" placeholder="ناوی بیزنەسەکەت" required/>
                </div>
                <div class="col-12">
                  <label class="form-label">دەربارەی کۆمپانیاکەت</label>
                  <textarea id="description" class="form-control" rows="3"
                    placeholder="ئەمجۆرە کالا و خزمەتگوزاریت دابین دەکرێت..."></textarea>
                </div>
              </div>
              <div class="d-flex gap-2 mt-3">
                <button type="button" class="btn-outline-custom py-3" onclick="goStep(1)" style="flex:1;justify-content:center">
                  <i class="bi bi-arrow-right"></i> گەڕانەوە
                </button>
                <button type="button" class="btn-primary-custom py-3" onclick="goStep(3)" style="flex:2;justify-content:center">
                  داهاتوو <i class="bi bi-arrow-left"></i>
                </button>
              </div>
            </div>

            <!-- Step 3: Password -->
            <div id="step-3" style="display:none">
              <h5 class="mb-3" style="color:var(--text-light)"><i class="bi bi-shield-lock me-2"></i>دامەزراندنی ئەکاونت</h5>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">پاسوەرد <span style="color:var(--danger)">*</span></label>
                  <div style="position:relative">
                    <input type="password" id="password" class="form-control" placeholder="لانیکەم ٦ پیت" required/>
                    <button type="button" class="btn p-0" onclick="togglePass('password')"
                      style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);background:none;border:none">
                      <i class="bi bi-eye-slash" id="eye1"></i>
                    </button>
                  </div>
                  <!-- Password strength -->
                  <div class="progress-custom mt-2">
                    <div class="progress-fill" id="pass-strength" style="width:0%;background:var(--danger)"></div>
                  </div>
                  <small id="pass-hint" style="color:var(--text-muted);font-size:0.8rem"></small>
                </div>
                <div class="col-12">
                  <label class="form-label">پشتڕاستکردنەوەی پاسوەرد <span style="color:var(--danger)">*</span></label>
                  <input type="password" id="confirm-password" class="form-control" placeholder="دووبارە بنووسەرەوە" required/>
                </div>
                <div class="col-12">
                  <div class="d-flex gap-2 align-items-start">
                    <input type="checkbox" id="terms" class="form-check-input mt-1" style="flex-shrink:0"/>
                    <label for="terms" class="form-check-label" style="font-size:0.9rem;color:var(--text-muted);cursor:pointer">
                      ڕازیم بە 
                      <span style="color:var(--primary-light)">مەرج و مەرجەکان</span>
                      و 
                      <span style="color:var(--primary-light)">سیاسەتی تایبەتیەتمەندی</span>
                    </label>
                  </div>
                </div>
              </div>
              <div class="d-flex gap-2 mt-3">
                <button type="button" class="btn-outline-custom py-3" onclick="goStep(2)" style="flex:1;justify-content:center">
                  <i class="bi bi-arrow-right"></i> گەڕانەوە
                </button>
                <button type="submit" class="btn-accent py-3" id="register-btn" style="flex:2;border-radius:50px;font-weight:700">
                  🚀 ئەکاونتم دروست بکە
                </button>
              </div>
            </div>
          </form>

          <div class="text-center mt-4">
            <p style="color:var(--text-muted);font-size:0.9rem">
              ئەکاونتت هەیە؟ 
              <a href="login.html" style="color:var(--primary-light);text-decoration:none;font-weight:600">
                چوونەژوورەوە
              </a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="js/categories.js"></script>
<script src="js/auth.js"></script>
<script src="js/products.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    Auth.requireGuest('dashboard.html');
    
    // Password strength monitor
    document.getElementById('password')?.addEventListener('input', checkPasswordStrength);
  });

  function goStep(step) {
    // Validate current step before moving forward
    const current = document.querySelector('[id^="step-"]:not([style*="display:none"])');
    const currentNum = parseInt(current?.id?.replace('step-', '') || '1');

    if (step > currentNum) {
      if (!validateStep(currentNum)) return;
    }

    // Hide all steps
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById(`step-${i}`);
      if (el) el.style.display = 'none';
      const circle = document.getElementById(`step${i}-circle`);
      if (circle) {
        circle.style.background = 'var(--card-border)';
        circle.style.color = 'var(--text-muted)';
      }
    }

    // Show target step
    const target = document.getElementById(`step-${step}`);
    if (target) target.style.display = 'block';

    // Update circle
    const circle = document.getElementById(`step${step}-circle`);
    if (circle) {
      circle.style.background = 'var(--primary)';
      circle.style.color = 'white';
    }

    // Mark completed steps
    for (let i = 1; i < step; i++) {
      const c = document.getElementById(`step${i}-circle`);
      if (c) {
        c.style.background = 'var(--accent)';
        c.style.color = 'var(--dark)';
        c.textContent = '✓';
      }
    }
  }

  function validateStep(step) {
    if (step === 1) {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      if (!name || !email || !phone) {
        showToast('تکایە خانەی پێویست پڕ بکەرەوە', 'warning');
        return false;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('ئیمەیڵی دروست بنووسە', 'warning');
        return false;
      }
    }
    if (step === 2) {
      const company = document.getElementById('company').value.trim();
      if (!company) {
        showToast('ناوی کۆمپانیاکەت بنووسە', 'warning');
        return false;
      }
    }
    return true;
  }

  function checkPasswordStrength() {
    const pass = document.getElementById('password').value;
    const bar = document.getElementById('pass-strength');
    const hint = document.getElementById('pass-hint');
    
    let strength = 0;
    if (pass.length >= 6) strength += 25;
    if (pass.length >= 10) strength += 25;
    if (/[A-Z]/.test(pass)) strength += 25;
    if (/[0-9!@#$%]/.test(pass)) strength += 25;

    bar.style.width = strength + '%';
    if (strength <= 25) {
      bar.style.background = 'var(--danger)';
      hint.textContent = '😟 زۆر لاواز';
    } else if (strength <= 50) {
      bar.style.background = 'var(--warning)';
      hint.textContent = '😐 مامناوەند';
    } else if (strength <= 75) {
      bar.style.background = '#ffd200';
      hint.textContent = '🙂 باشە';
    } else {
      bar.style.background = 'var(--accent)';
      hint.textContent = '💪 زۆر بەهێز';
    }
  }

  function togglePass(id) {
    const input = document.getElementById(id);
    const eyeId = id === 'password' ? 'eye1' : 'eye2';
    const icon = document.getElementById(eyeId);
    if (input.type === 'password') {
      input.type = 'text';
      if (icon) icon.className = 'bi bi-eye';
    } else {
      input.type = 'password';
      if (icon) icon.className = 'bi bi-eye-slash';
    }
  }

  document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const terms = document.getElementById('terms').checked;

    if (password.length < 6) { showToast('پاسوەرد دەبێت لانیکەم ٦ پیت بێت', 'warning'); return; }
    if (password !== confirm) { showToast('پاسوەردەکان یەکسان نین', 'error'); return; }
    if (!terms) { showToast('تکایە ڕازیبوون بە مەرجەکان هەڵبژێرە', 'warning'); return; }

    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>چاوەڕوان بە...';

    setTimeout(() => {
      const result = Auth.register({
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        city: document.getElementById('city').value,
        company: document.getElementById('company').value.trim(),
        description: document.getElementById('description').value.trim(),
        password
      });

      if (result.success) {
        showToast(`بەخێربێیت، ${result.user.name}! ئەکاونتەکەت دروست کرا 🎉`, 'success', 2000);
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } else {
        showToast(result.msg, 'error');
        btn.disabled = false;
        btn.innerHTML = '🚀 ئەکاونتم دروست بکە';
      }
    }, 700);
  });
</script>
</body>
</html>
