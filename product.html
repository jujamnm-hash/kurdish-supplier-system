<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>کالا | دابینکەر مارکێت</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="navbar-placeholder" data-active="products"></div>
<div class="toast-container" id="toast-container"></div>

<div class="container py-5" id="product-container">
  <div class="d-flex align-items-center justify-content-center" style="min-height:60vh">
    <div class="spinner-custom"></div>
  </div>
</div>

<!-- Reviews Section -->
<section class="py-5" id="reviews-section" style="border-top:1px solid var(--card-border)">
  <div class="container">
    <div class="section-divider"></div>
    <h3 class="section-title mb-1">⭐ بەیانە و دەنگە</h3>
    <p class="section-subtitle">بوচی خەریدارانی وەریگەر</p>

    <!-- Stats + Form Row -->
    <div class="row g-4 mb-4">
      <!-- Rating Stats -->
      <div class="col-lg-4">
        <div class="glass-card p-4 text-center" id="review-stats">
          <div id="avg-score" style="font-size:3.5rem;font-weight:800;color:var(--accent);line-height:1">-</div>
          <div id="avg-stars" style="font-size:1.6rem;margin:0.5rem 0"></div>
          <div id="review-count" style="color:var(--text-muted);font-size:0.9rem"></div>
          <div id="dist-bars" class="mt-3"></div>
        </div>
      </div>

      <!-- Add Review Form -->
      <div class="col-lg-8">
        <div class="glass-card p-4">
          <h6 style="color:var(--text-light);margin-bottom:1rem">✍️ بەیانەکەت بنیسە</h6>
          <form id="review-form" onsubmit="submitReview(event)">
            <!-- Star picker -->
            <div class="mb-3">
              <label class="form-label">دەنگە <span style="color:var(--danger)">*</span></label>
              <div id="star-picker" style="display:flex;gap:0.35rem;font-size:2rem;cursor:pointer">
                <span data-v="1" onclick="pickStar(1)" style="color:var(--border);">&#9733;</span>
                <span data-v="2" onclick="pickStar(2)" style="color:var(--border);">&#9733;</span>
                <span data-v="3" onclick="pickStar(3)" style="color:var(--border);">&#9733;</span>
                <span data-v="4" onclick="pickStar(4)" style="color:var(--border);">&#9733;</span>
                <span data-v="5" onclick="pickStar(5)" style="color:var(--border);">&#9733;</span>
              </div>
              <input type="hidden" id="review-rating" value="0"/>
            </div>
            <div class="mb-3">
              <label class="form-label">ناوت</label>
              <input type="text" id="review-name" class="form-control" placeholder="ناوت (هەڵبژیرە)"/>
            </div>
            <div class="mb-3">
              <label class="form-label">بەیانەکە</label>
              <textarea id="review-text" class="form-control" rows="3" placeholder="بێرووتەکەت ..."></textarea>
            </div>
            <button type="submit" class="btn-primary-custom">⭐ نێردنی بەیانە</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Reviews List -->
    <div id="reviews-list"></div>
  </div>
</section>

<!-- Related Products -->
<section class="py-5" id="related-section" style="display:none;border-top:1px solid var(--card-border)">
  <div class="container">
    <div class="section-divider"></div>
    <h3 class="section-title mb-1">🔗 کالاکانی هاوشێوە</h3>
    <p class="section-subtitle">کالاکانی هەمان پۆل</p>
    <div class="row g-4 stagger" id="related-grid"></div>
  </div>
</section>

<!-- Recently Viewed -->
<section class="py-5" id="recently-viewed-section" style="display:none;border-top:1px solid var(--card-border)">
  <div class="container">
    <div class="section-divider"></div>
    <h3 class="section-title mb-1">🕞️ ئەوانەی بێنیتوت</h3>
    <p class="section-subtitle">کالاکانی کە دوایین بینیت</p>
    <div class="row g-4 stagger" id="recently-viewed-grid"></div>
  </div>
</section>

<!-- Contact Modal -->
<div class="modal fade" id="contactModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:var(--bg-card);border:1px solid var(--card-border);border-radius:var(--radius)">
      <div class="modal-header" style="border-bottom:1px solid var(--card-border)">
        <h5 class="modal-title" style="color:var(--text-light)">📩 پەیام بنێرە</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="contact-form" onsubmit="sendContactMessage(event)">
          <div class="mb-3">
            <label class="form-label">ناوت <span style="color:var(--danger)">*</span></label>
            <input type="text" id="contact-name" class="form-control" placeholder="ناوت بنووسە..." required/>
          </div>
          <div class="mb-3">
            <label class="form-label">ژمارەی مۆبایل</label>
            <input type="tel" id="contact-phone" class="form-control" placeholder="07x xxxx xxxx"/>
          </div>
          <div class="mb-3">
            <label class="form-label">پەیامەکە <span style="color:var(--danger)">*</span></label>
            <textarea id="contact-msg" class="form-control" rows="4" placeholder="پەیامەکە کە ناویت..." required></textarea>
          </div>
          <div class="d-flex gap-2 justify-content-end">
            <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">بەتالکردن</button>
            <button type="submit" class="btn-primary-custom">📤 نێردن</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:0">
  <div class="container">
    <div class="footer-bottom" style="border-top:none;padding-top:0">
      <p>© ٢٠٢٦ دابینکەر مارکێت — هەموو مافەکان پارێزراون</p>
    </div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/categories.js"></script>
<script src="js/auth.js"></script>
<script src="js/products.js"></script>
<script src="js/favorites.js"></script>
<script src="js/recently.js"></script>
<script src="js/notifications.js"></script>
<script src="js/reviews.js"></script>
<script src="js/compare.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) {
      document.getElementById('product-container').innerHTML = `
        <div class="empty-state"><div class="empty-icon">🔍</div><h4>کالاکە نەدۆزرایەوە</h4>
        <a href="index.html" class="btn-primary-custom mt-3">← گەڕانەوە</a></div>`;
      return;
    }

    function initProduct() {
      const product = Products.getById(id);
      if (!product) {
        document.getElementById('product-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⏳</div>
            <h4>چاوەڕوانی بارکردنی دیتا...</h4>
            <p style="color:var(--text-muted);font-size:0.9rem">کالاکە لە کلاود بارەکەیدا دەبێت</p>
          </div>`;
        // Wait for cloud sync then retry once
        window.addEventListener('kss:synced', () => {
          const p2 = Products.getById(id);
          if (p2) {
            showProduct(p2);
          } else {
            document.getElementById('product-container').innerHTML = `
              <div class="empty-state"><div class="empty-icon">😕</div><h4>ئەم کالایە بەردەست نییە</h4>
              <a href="index.html" class="btn-primary-custom mt-3">← گەڕانەوە</a></div>`;
          }
        }, { once: true });
        return;
      }
      showProduct(product);
    }

    function showProduct(product) {
      // Track view
      Products.incrementViews(id);
      // Track recently viewed
      if (typeof RecentlyViewed !== 'undefined') RecentlyViewed.add(id);
      // Fire view milestone notifications for supplier
      const refreshed = Products.getById(id);
      if (typeof Notifs !== 'undefined') Notifs.checkViewMilestones(refreshed);

      // Update page title
      document.title = `${product.name} | دابینکەر مارکێت`;

      // Render product
      renderProduct(product);
      renderRelated(product);
      renderRecentlyViewed(id);
      renderReviews(id);
    }

    initProduct();
  });

  function renderProduct(p) {
    const cat = getCategoryById(p.category);
    const imgHtml = p.images && p.images[0]
      ? `<img src="${p.images[0]}" alt="${p.name}" class="product-detail-img"
           onerror="this.outerHTML='<div class=\\"product-detail-img-placeholder\\">${cat.icon}</div>'">`
      : `<div class="product-detail-img-placeholder">${cat.icon}</div>`;

    const isNew = (Date.now() - new Date(p.createdAt).getTime()) < 3 * 24 * 3600 * 1000;
    const user = Auth.getCurrentUser();
    const isOwner = user && user.id === p.supplierId;

    document.getElementById('product-container').innerHTML = `
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb" style="background:none;padding:0">
          <li class="breadcrumb-item"><a href="index.html" style="color:var(--text-muted);text-decoration:none">سەرەکی</a></li>
          <li class="breadcrumb-item"><a href="index.html?cat=${p.category}" style="color:var(--text-muted);text-decoration:none">${cat.icon} ${cat.name}</a></li>
          <li class="breadcrumb-item active" style="color:var(--text-main)">${p.name.substring(0,30)}</li>
        </ol>
      </nav>

      <div class="row g-5">
        <!-- Image -->
        <div class="col-lg-5 fade-in">
          ${imgHtml}
          ${p.tags && p.tags.length ? `
            <div class="mt-3 d-flex flex-wrap gap-1">
              ${p.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
            </div>` : ''}
        </div>

        <!-- Details -->
        <div class="col-lg-7 fade-in">
          <!-- Badges -->
          <div class="d-flex gap-2 flex-wrap mb-3">
            <span class="badge-custom badge-primary">${cat.icon} ${cat.name}</span>
            ${isNew ? '<span class="badge-custom badge-success">✨ نوێ</span>' : ''}
            ${p.autoDetected ? '<span class="badge-custom" style="background:rgba(247,151,30,0.15);color:#ffd200">⚡ پۆلبندی خۆکار</span>' : ''}
            ${!p.active ? '<span class="badge-custom badge-danger">⛔ ناچالاک</span>' : ''}
          </div>

          <!-- Title -->
          <h1 style="font-size:1.75rem;font-weight:800;color:var(--text-light);line-height:1.3;margin-bottom:1rem">
            ${p.name}
          </h1>

          <!-- Price -->
          <div class="mb-4 p-3" style="background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);border-radius:var(--radius-sm);display:inline-block">
            <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:4px">نرخ</div>
            <div style="font-size:2rem;font-weight:800;color:var(--accent)">${formatPrice(p.price, p.currency)}</div>
          </div>

          <!-- Stats Row -->
          <div class="d-flex gap-4 mb-4 flex-wrap">
            <div style="text-align:center">
              <div style="font-size:1.25rem;font-weight:700;color:var(--text-light)">👁 ${p.views || 0}</div>
              <div style="font-size:0.8rem;color:var(--text-muted)">بینین</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:1.25rem;font-weight:700;color:var(--text-light)">📦 ${p.stock || 0}</div>
              <div style="font-size:0.8rem;color:var(--text-muted)">ستۆک</div>
            </div>
            ${p.location ? `<div style="text-align:center">
              <div style="font-size:1.25rem;font-weight:700;color:var(--text-light)">📍 ${p.location}</div>
              <div style="font-size:0.8rem;color:var(--text-muted)">شوێن</div>
            </div>` : ''}
            <div style="text-align:center">
              <div style="font-size:1.25rem;font-weight:700;color:var(--text-light)">📅 ${timeAgo(p.createdAt)}</div>
              <div style="font-size:0.8rem;color:var(--text-muted)">تۆمارکرا</div>
            </div>
          </div>

          <!-- Description -->
          <div class="mb-4">
            <h5 style="color:var(--text-light);margin-bottom:0.75rem">📄 وەسف</h5>
            <div style="color:var(--text-muted);line-height:2;font-size:0.95rem;white-space:pre-line">${p.description}</div>
          </div>

          <!-- Supplier Info -->
          <div class="glass-card p-3 mb-4" style="border:1px solid rgba(108,99,255,0.2)">
            <h6 style="color:var(--text-muted);margin-bottom:1rem;font-size:0.85rem">👤 زانیاری دابینکەر</h6>
            <div class="d-flex align-items-center gap-3">
              <div class="supplier-avatar" style="width:50px;height:50px;font-size:1.25rem;background:var(--gradient)">
                ${(p.supplierCompany || p.supplierName || '?').charAt(0)}
              </div>
              <div>
                <div style="font-weight:700;color:var(--text-light)">${p.supplierCompany || p.supplierName}</div>
                <div style="font-size:0.85rem;color:var(--text-muted)">${p.supplierName}</div>
              </div>
              <a href="supplier.html?id=${p.supplierId}" class="btn-outline-custom ms-auto" style="font-size:0.8rem;padding:0.35rem 0.9rem">
                👤 پڕۆفایل
              </a>
            </div>
            ${p.supplierPhone ? `
              <div class="mt-3 pt-3" style="border-top:1px solid var(--card-border)">
                <a href="tel:${p.supplierPhone}" class="btn-primary-custom" style="padding:0.6rem 1.5rem">
                  📞 ${p.supplierPhone} — پەیوەندی بکە
                </a>
              </div>` : ''}
          </div>

          <!-- Action Buttons -->
          <div class="d-flex gap-3 flex-wrap">
            ${p.supplierPhone ? `
              <a href="https://wa.me/${p.supplierPhone.replace(/\D/g,'')}" target="_blank" class="btn-accent"
                style="border-radius:50px;padding:0.75rem 2rem;text-decoration:none">
                💬 واتساپ
              </a>` : ''}
            <button id="fav-btn-detail" class="btn-outline-custom" onclick="toggleFavDetail('${p.id}', this)">
              ${typeof Favorites !== 'undefined' && Favorites.isFav('${p.id}') ? '❤️ پاشەکەوتکراوە' : '🤍 پاشەکەوتکرن'}
            </button>
            <button class="btn-outline-custom" data-bs-toggle="modal" data-bs-target="#contactModal">
              📩 پەیام بنێرە
            </button>
            ${isOwner ? `
              <a href="dashboard.html" class="btn-outline-custom">
                ✏️ ویرایستن
              </a>` : ''}
            <button class="btn-outline-custom" onclick="shareProduct()">
              🔗 هاوبەشکردن
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function renderRelated(product) {
    const related = Products.getByCategory(product.category)
      .filter(p => p.id !== product.id)
      .slice(0, 4);

    if (!related.length) return;

    document.getElementById('related-section').style.display = 'block';
    document.getElementById('related-grid').innerHTML = related.map(p =>
      `<div class="col-sm-6 col-lg-3">${buildProductCard(p)}</div>`
    ).join('');
  }

  function shareProduct() {
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: document.title, url });
    } else {
      navigator.clipboard.writeText(url).then(() => {
        showToast('🔗 بەستەرەکە کۆپی کرا!', 'success');
      });
    }
  }

  function toggleFavDetail(productId, btn) {
    if (typeof Favorites === 'undefined') return;
    const added = Favorites.toggle(productId);
    btn.innerHTML = added ? '❤️ پاشەکەوتکراوە' : '🤍 پاشەکەوتکرن';
    showToast(added ? '❤️ زیادکرا بۆ پاشەکەوتەکان' : '🤍 لە پاشەکەوتەکان سڕایەوە', added ? 'success' : 'info');
    if (typeof updateFavBadge !== 'undefined') updateFavBadge();
  }

  function renderRecentlyViewed(currentId) {
    if (typeof RecentlyViewed === 'undefined') return;
    const products = RecentlyViewed.getProducts().filter(p => p.id !== currentId).slice(0, 4);
    if (!products.length) return;
    document.getElementById('recently-viewed-section').style.display = 'block';
    document.getElementById('recently-viewed-grid').innerHTML = products.map(p =>
      `<div class="col-sm-6 col-lg-3">${buildProductCard(p)}</div>`
    ).join('');
  }

  // ===== REVIEWS =====
  let currentProductId = null;

  function renderReviews(productId) {
    currentProductId = productId;
    const stats = Reviews.getStats(productId);
    const reviews = Reviews.getByProduct(productId);

    // Stats
    document.getElementById('avg-score').textContent = stats.count ? stats.avg : '-';
    document.getElementById('avg-stars').innerHTML = stats.count ? Reviews.starsHTML(Math.round(stats.avg), '1.4rem') : '';
    document.getElementById('review-count').textContent = stats.count ? stats.count + ' بەیانه' : 'هێشتا بەیانەیەک نییە';
    document.getElementById('dist-bars').innerHTML = [5,4,3,2,1].map(star => {
      const cnt = stats.distribution[star] || 0;
      const pct = stats.count ? Math.round((cnt / stats.count) * 100) : 0;
      return `<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.35rem;font-size:0.8rem">
        <span style="color:#f7971e;width:24px">${star}★</span>
        <div style="flex:1;height:6px;background:var(--border);border-radius:3px">
          <div style="height:100%;width:${pct}%;background:#f7971e;border-radius:3px"></div>
        </div>
        <span style="color:var(--text-muted);width:20px">${cnt}</span>
      </div>`;
    }).join('');

    // List
    const list = document.getElementById('reviews-list');
    if (!reviews.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><h4>هێشتا بەیانەیەک نییە</h4><p>یەکەم بǔ بیتە بەیانەکەت بنیسە</p></div>`;
      return;
    }
    list.innerHTML = reviews.map(r => `
      <div class="glass-card p-3 mb-3">
        <div class="d-flex align-items-center justify-content-between mb-2 flex-wrap gap-2">
          <div class="d-flex align-items-center gap-2">
            <div class="supplier-avatar" style="width:38px;height:38px;font-size:1rem;background:var(--gradient)">${r.name.charAt(0)}</div>
            <div>
              <div style="font-weight:600;color:var(--text-light);font-size:0.9rem">${r.name}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">${timeAgo(r.time)}</div>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2">
            ${Reviews.starsHTML(r.rating)}
            <button onclick="removeReview('${productId}','${r.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.8rem;opacity:0.5">×</button>
          </div>
        </div>
        ${r.text ? `<p style="color:var(--text-main);font-size:0.9rem;line-height:1.7;margin:0">${r.text}</p>` : ''}
      </div>`).join('');
  }

  let pickedStar = 0;
  function pickStar(value) {
    pickedStar = value;
    document.getElementById('review-rating').value = value;
    document.querySelectorAll('#star-picker span').forEach((el, i) => {
      el.style.color = i < value ? '#f7971e' : 'var(--border)';
    });
  }

  function submitReview(e) {
    e.preventDefault();
    if (!currentProductId) return;
    const rating = parseInt(document.getElementById('review-rating').value);
    if (!rating) { showToast('تکایە دەنگەکە هەڵبژێرە!', 'warning'); return; }
    Reviews.add(currentProductId, {
      rating,
      text: document.getElementById('review-text').value,
      name: document.getElementById('review-name').value
    });
    showToast('✅ بەیانەکەت زیادکرا!', 'success');
    document.getElementById('review-form').reset();
    pickedStar = 0;
    document.querySelectorAll('#star-picker span').forEach(el => el.style.color = 'var(--border)');
    document.getElementById('review-rating').value = 0;
    renderReviews(currentProductId);
  }

  function removeReview(productId, reviewId) {
    Reviews.remove(productId, reviewId);
    renderReviews(productId);
  }

  function sendContactMessage(e) {
    e.preventDefault();
    const name = document.getElementById('contact-name').value.trim();
    const phone = document.getElementById('contact-phone').value.trim();
    const msg = document.getElementById('contact-msg').value.trim();
    const productId = new URLSearchParams(location.search).get('id');
    const product = Products.getById(productId);
    if (!product) { showToast('هەڵەیەک ڕوویدا', 'error'); return; }

    const ok = Notifs.sendMessage({
      toSupplierId: product.supplierId,
      fromName: name, fromPhone: phone, message: msg,
      productId: product.id, productName: product.name
    });

    if (ok) {
      showToast('✅ پەیامەکەت سەرکەوتوانە نێردرا!', 'success');
      bootstrap.Modal.getInstance(document.getElementById('contactModal')).hide();
      document.getElementById('contact-form').reset();
    } else {
      showToast('هەڵەیەک ڕوویدا', 'error');
    }
  }
</script>
</body>
</html>
